<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-mortarboard-fill" style="font-size:1.5rem"></i> EduTrack
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/students"><i class="bi bi-people"></i> Students</a></li>
                <li class="nav-item"><a class="nav-link" href="/courses"><i class="bi bi-book"></i> Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="/registrations"><i class="bi bi-clipboard-check"></i> Registrations</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container" style="max-width:550px">
    <div class="page-header"><h2>👤 Student Profile</h2></div>
    <div class="card p-4">
        <ul class="list-group list-group-flush">
            <li class="list-group-item"><strong>ID:</strong> <span th:text="${student.id}"></span></li>
            <li class="list-group-item"><strong>Name:</strong> <span th:text="${student.name}"></span></li>
            <li class="list-group-item"><strong>Email:</strong> <span th:text="${student.email}"></span></li>
            <li class="list-group-item"><strong>Program:</strong> <span th:text="${student.program}"></span></li>
            <li class="list-group-item"><strong>Year:</strong> <span th:text="${student.year}"></span></li>
        </ul>
        <div class="mt-3">
            <a th:href="@{/registrations/student/{id}(id=${student.id})}" class="btn btn-purple">View Registered Courses</a>
            <a href="/students" class="btn btn-light ms-2">Back</a>
        </div>
    </div>
</div>
</body>
</html>
