<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registrations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="bi bi-mortarboard-fill" style="font-size:1.5rem"></i> EduTrack
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/students"><i class="bi bi-people"></i> Students</a></li>
        <li class="nav-item"><a class="nav-link" href="/courses"><i class="bi bi-book"></i> Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="/registrations"><i class="bi bi-clipboard-check"></i> Registrations</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container">
  <div class="page-header d-flex justify-content-between align-items-center">
    <h2>📝 All Registrations</h2>
    <a href="/registrations/register" class="btn btn-light">+ Register Student</a>
  </div>
  <div class="card p-3">
    <table class="table table-hover mb-0">
      <thead>
      <tr><th>ID</th><th>Student</th><th>Course</th><th>Semester</th><th>Actions</th></tr>
      </thead>
      <tbody>
      <tr th:each="reg : ${registrations}">
        <td th:text="${reg.id}"></td>
        <td th:text="${reg.student.name}"></td>
        <td th:text="${reg.course.courseName}"></td>
        <td th:text="${reg.semester}"></td>
        <td>
          <a th:href="@{/registrations/drop/{id}(id=${reg.id})}" class="btn btn-sm btn-danger"
             onclick="return confirm('Drop this course?')">Drop</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
