<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Course Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="bi bi-mortarboard-fill" style="font-size:1.5rem"></i> EduTrack
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/students"><i class="bi bi-people"></i> Students</a></li>
        <li class="nav-item"><a class="nav-link" href="/courses"><i class="bi bi-book"></i> Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="/registrations"><i class="bi bi-clipboard-check"></i> Registrations</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container" style="max-width:550px">
  <div class="page-header"><h2>📚 Course Form</h2></div>
  <div class="card p-4">
    <form th:action="@{/courses/add}" th:object="${course}" method="post">
      <div class="mb-3">
        <label class="form-label fw-bold">Course Name</label>
        <input type="text" th:field="*{courseName}" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Course Code</label>
        <input type="text" th:field="*{courseCode}" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Lecturer</label>
        <input type="text" th:field="*{lecturer}" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Credits</label>
        <input type="number" th:field="*{credits}" class="form-control" min="1" max="10" required/>
      </div>
      <button type="submit" class="btn btn-primary">Save Course</button>
      <a href="/courses" class="btn btn-light ms-2">Cancel</a>
    </form>
  </div>
</div>
</body>
</html>
