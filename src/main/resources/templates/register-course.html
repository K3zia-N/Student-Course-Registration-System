<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Register for Course</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="bi bi-mortarboard-fill" style="font-size:1.5rem"></i> EduTrack
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/students"><i class="bi bi-people"></i> Students</a></li>
        <li class="nav-item"><a class="nav-link" href="/courses"><i class="bi bi-book"></i> Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="/registrations"><i class="bi bi-clipboard-check"></i> Registrations</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container" style="max-width:550px">
  <div class="page-header"><h2>📝 Register for a Course</h2></div>
  <div class="card p-4">
    <form action="/registrations/register" method="post">
      <div class="mb-3">
        <label class="form-label fw-bold">Student</label>
        <select name="studentId" class="form-select" required>
          <option value="">-- Select Student --</option>
          <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name}"></option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Course</label>
        <select name="courseId" class="form-select" required>
          <option value="">-- Select Course --</option>
          <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseName}"></option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Semester</label>
        <input type="text" name="semester" class="form-control" placeholder="e.g. Semester 1 2025" required/>
      </div>
      <button type="submit" class="btn btn-primary">Register</button>
      <a href="/registrations" class="btn btn-light ms-2">Cancel</a>
    </form>
  </div>
</div>
</body>
</html>
